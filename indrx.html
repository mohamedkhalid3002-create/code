<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      body{
        background-color: rgb(48, 46, 46);
      }
      body *{
        color: aliceblue;
        gap: 20px;
      }
      .title{
        width: 500px;
        margin:50px auto;
        border-radius: 20px;
        background-color: rgb(78, 78, 78);
        padding: 20px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 10px !important;
      }
      .title h2{
        width: 100%;
        text-align: center;
      }
      .title input{
        display: block;
        width: 88%;
        padding: 8px;
        margin-bottom: 15px; 
        background-color: rgb(104, 103, 103);
        border-radius: 8px;
        border: none;
      }
     .title .input{
        width:28%;
        margin: 5px; 
      }
      .title label{
        display: block;
        width: 100%;      /* يخلي الليبل يظهر فوق الحقل */
        margin-bottom: 5px;  /* مسافة بين الليبل والانبت */
        font-weight: bold; 
      }
    </style>
</head>
<body>
<div class="title">
  <h2 class="head">Uonets</h2>
  <div class="input">
    <label for="type">النوع</label>
    <input type="text" id="type" name="type">
  </div>

  <div class="input">
      <label for="height">ارتفاع</label>
      <input type="number" id="height" name="height">
  </div>

  <div class="input">
      <label for="deep">عمق</label>
      <input type="number" id="deep" name="deep">
  </div>
  <div class="input" style="width: 100%; ">
      <input type="submit" style="width: 100%;" id="submit" name="submit" placeholder="اضافة">
  </div>
</div>
<div class="title">
  <h2 class="head">اسم النوغ</h2>

    <div class="input" style="width: 100%;">
      <label for="deep">العرض</label>  
      <input type="number" id="width" name="width" >
    </div>
  <div class="title">
      <h2 class="head">قطعه{width}</h2>
  </div>
</div>
    <script src="scrept.js"></script>
</body>
</html>
