<script>
document.addEventListener("DOMContentLoaded", function () {

  const overlay = document.createElement("div");
  overlay.className = "custom-overlay";

  const popup = document.createElement("div");
  popup.className = "custom-popup";

  const img = document.createElement("img");
  img.src = "https://github.com/mohamedkhalid3002-create/mp4/blob/main/qetahhq..png?raw=true";
  img.className = "popup-img";

  const closeBtn = document.createElement("span");
  closeBtn.innerHTML = "✕";
  closeBtn.className = "popup-close";

  closeBtn.onclick = function () {
    overlay.remove();
  };

  popup.appendChild(closeBtn);
  popup.appendChild(img);
  overlay.appendChild(popup);

  document.body.appendChild(overlay);

});
</script>

<style>
.custom-overlay{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.custom-popup{
  position:relative;
  max-width:500px;
  width:90%;
  background:#fff;
  padding:10px;
  border-radius:12px;
  text-align:center;
}

.popup-img{
  width:100%;
  height:auto;
  border-radius:10px;
}

.popup-close{
  position:absolute;
  top:-12px;
  right:-12px;
  background:#000;
  color:#fff;
  width:30px;
  height:30px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:16px;
}
</style>
